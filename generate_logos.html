<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; padding: 0; margin: 0; }
        .logo-box { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="kong" class="logo-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Kong_Logo.png">
    </div>
    <div id="keycloak" class="logo-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Keycloak_Logo.png">
    </div>
    <div id="opa" class="logo-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c2/Open_Policy_Agent_icon.png">
    </div>
    <div id="redis" class="logo-box">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/redis/redis-original.svg">
    </div>
    <div id="postgresql" class="logo-box">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg">
    </div>
    <div id="fastapi" class="logo-box">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/fastapi/fastapi-original.svg">
    </div>
</body>
</html>
