# ─────────────────────────────────────────────────────────────────────────────
# intent-classifier.yaml — HuggingFace zero-shot intent classification + Redis cache
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: intent-taxonomy-v1
  namespace: ai-application
  labels:
    app: intent-classifier
    project: enterprise-ai-gateway
data:
  intent_labels_v1.yaml: |
    version: "1"
    confidence_threshold: 0.32
    hypothesis_template: "This is related to {}."
    candidate_labels:
      - general_chat
      - code_generation
      - summarization
      - advanced_chat
    label_hypotheses:
      general_chat: "casual chat and everyday small talk"
      code_generation: "software and programming"
      summarization: "brief summaries and TL;DR of content"
      advanced_chat: "formal proofs and deep technical theory"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: intent-classifier-config
  namespace: ai-application
  labels:
    app: intent-classifier
    project: enterprise-ai-gateway
data:
  PORT: "3010"
  # REDIS_URL is overridden at runtime by Vault (secret/redis/platform); this is the fallback
  REDIS_URL: "redis://redis.ai-data.svc.cluster.local:6379/1"
  # ── Vault integration ──────────────────────────────────────────────────────
  VAULT_ENABLED: "true"
  VAULT_ADDR: "http://vault.ai-data.svc.cluster.local:8200"
  VAULT_TOKEN: "dev-root-token"
  VAULT_MOUNT: "secret"
  INTENT_TAXONOMY_PATH: "/etc/intent-taxonomy/intent_labels_v1.yaml"
  HF_ZERO_SHOT_MODEL: "typeform/distilbert-base-uncased-mnli"
  INTENT_CLASSIFIER_CACHE_TTL_SECONDS: "3600"
  INTENT_CLASSIFIER_LRU_MAX: "10000"
  LLM_BASE_URL: "http://host.docker.internal:11434/api/chat"
  LLM_MODEL: "llama3.2"
  LLM_TIMEOUT_SECONDS: "45"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-classifier
  namespace: ai-application
  labels:
    app: intent-classifier
    project: enterprise-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intent-classifier
  template:
    metadata:
      labels:
        app: intent-classifier
    spec:
      containers:
        - name: intent-classifier
          image: api-gateways-intent-classifier:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3010
          envFrom:
            - configMapRef:
                name: intent-classifier-config
          volumeMounts:
            - name: intent-taxonomy
              mountPath: /etc/intent-taxonomy
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3010
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: intent-taxonomy
          configMap:
            name: intent-taxonomy-v1
---
apiVersion: v1
kind: Service
metadata:
  name: intent-classifier
  namespace: ai-application
  labels:
    app: intent-classifier
    project: enterprise-ai-gateway
spec:
  selector:
    app: intent-classifier
  ports:
    - port: 3010
      targetPort: 3010
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intent-classifier-hpa
  namespace: ai-application
  labels:
    project: enterprise-ai-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intent-classifier
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
