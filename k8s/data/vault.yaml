# ─────────────────────────────────────────────────────────────────────────────
# vault.yaml  —  HashiCorp Vault (dev mode)
#
# Runs in the ai-data namespace alongside the databases.
# Dev mode: auto-unsealed, single node, in-memory backend.
# Root token: dev-root-token  (set via VAULT_DEV_ROOT_TOKEN_ID)
#
# NOTE: This is intentionally dev mode for the internship demo.
#   Production would use: HA mode, auto-unseal (KMS), AppRole/K8s auth method.
#
# Applied IMPERATIVELY by deploy.ps1 before kustomize — NOT in kustomization.yaml.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: ai-data
  labels:
    app: vault
    project: enterprise-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
        project: enterprise-ai-gateway
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          ports:
            - containerPort: 8200
              name: vault-port
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "dev-root-token"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          command: ["vault", "server", "-dev"]
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: ai-data
  labels:
    app: vault
    project: enterprise-ai-gateway
spec:
  selector:
    app: vault
  ports:
    - name: vault-port
      port: 8200
      targetPort: 8200
  type: ClusterIP
