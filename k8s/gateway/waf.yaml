# ─────────────────────────────────────────────────────────────────────────────
# waf.yaml  —  Edge Security: OWASP ModSecurity CRS (nginx-based)
#
# This is the SOLE public-facing LoadBalancer in the ai-gateway namespace.
# All external traffic enters here before reaching Kong DP.
#
# Architecture:
#   Internet -> WAF:80 (LoadBalancer) -> kong-dp:8000 (ClusterIP) -> kong-cp -> apps
#
# Image built locally from waf/ (FROM owasp/modsecurity-crs:nginx).
# Dev mode matches docker-compose.yml WAF service configuration exactly.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: waf-config
  namespace: ai-gateway
  labels:
    app: waf
    project: enterprise-ai-gateway
data:
  # ── Upstream backend (Kong Data Plane, now ClusterIP-only) ───────────────
  BACKEND: "http://kong-dp.ai-gateway.svc.cluster.local:80"
  PROXY_SSL: "off"

  # ── ModSecurity rule engine ───────────────────────────────────────────────
  MODSEC_RULE_ENGINE: "On"          # Prevention mode — blocks malicious requests
  # MODSEC_RULE_ENGINE: "DetectionOnly"  # Switch for debug mode (logs only)

  # ── Audit logging ─────────────────────────────────────────────────────────
  MODSEC_AUDIT_ENGINE: "On"
  MODSEC_AUDIT_LOG: "/var/log/modsec_audit.log"
  MODSEC_AUDIT_LOG_FORMAT: "JSON"

  # ── CRS tuning (mirrors docker-compose.yml) ───────────────────────────────
  PARANOIA: "1"
  ANOMALY_INBOUND: "5"
  ANOMALY_OUTBOUND: "4"
  RESTRICTED_EXTENSIONS: ".cmd/ .com/ .config/ .dll/ .sql/ .py/ "
  MSG_403: "Forbidden by WAF"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waf
  namespace: ai-gateway
  labels:
    app: waf
    project: enterprise-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waf
  template:
    metadata:
      labels:
        app: waf
        project: enterprise-ai-gateway
    spec:
      initContainers:
        # nginx expects /var/log/nginx/ to exist; emptyDir mounts an empty dir
        # at /var/log so we create the nginx subdirectory before nginx starts.
        - name: init-log-dirs
          image: busybox:1.36
          command: ['sh', '-c', 'mkdir -p /var/log/nginx && chmod -R 777 /var/log']
          volumeMounts:
            - name: modsec-logs
              mountPath: /var/log
      containers:
        # ── Main WAF container (owasp/modsecurity-crs:nginx) ─────────────────
        - name: waf
          image: api-gateways-waf:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: waf-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          volumeMounts:
            - name: modsec-logs
              mountPath: /var/log

        # ── nginx-prometheus-exporter sidecar ────────────────────────────────
        # Exposes nginx metrics (connections, requests) at :9113/metrics.
        # The owasp/modsecurity-crs:nginx image serves stub_status at
        # /nginx-status on the same port 8080 as the proxy.
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1
          args:
            - -nginx.scrape-uri=http://127.0.0.1:8080/metrics/nginx
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9113
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        # emptyDir for ModSecurity audit log — readable via kubectl exec
        - name: modsec-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: waf
  namespace: ai-gateway
  labels:
    app: waf
    project: enterprise-ai-gateway
spec:
  selector:
    app: waf
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 9113
      targetPort: 9113
  type: LoadBalancer   # sole public entry point — takes over :80 from kong-dp
