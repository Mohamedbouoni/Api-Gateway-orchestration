apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-intent-classifier
  namespace: {{ .Release.Namespace }}
  labels:
    app: intent-classifier
    project: enterprise-ai-gateway
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.intentClassifier.replicaCount }}
  selector:
    matchLabels:
      app: intent-classifier
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: intent-classifier
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: intent-classifier
          image: "{{ .Values.intentClassifier.image.repository }}:{{ .Values.intentClassifier.image.tag }}"
          imagePullPolicy: {{ .Values.intentClassifier.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.intentClassifier.service.port }}
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
